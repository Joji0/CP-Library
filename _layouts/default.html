<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title | default: "CP-Library" }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/syntax.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', var(--font-sans); }</style>
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
    <a href="{{ '/' | relative_url }}" class="logo">
      <div class="logo-icon">CP</div>
      <span>CP-Library</span>
    </a>
    <div class="header-right">
      <a href="https://github.com/joji0/CP-Library" class="github-link" target="_blank">
        <svg height="20" width="20" viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        GitHub
      </a>
    </div>
  </header>

  <!-- Sidebar -->
  {% include sidebar.html %}

  <!-- Main -->
  <main class="main-content">
    {{ content }}

    <footer class="site-footer">
      Built by <a href="https://github.com/joji0">joji0</a> · Powered by Jekyll
    </footer>
  </main>

  <!-- MathJax -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>

  <!-- Highlight active sidebar link -->
  <script>
    (function() {
      var path = window.location.pathname.replace(/\/$/, '').replace(/\.html$/, '');
      var links = document.querySelectorAll('.sidebar-links a');
      links.forEach(function(a) {
        var href = a.getAttribute('href').replace(/\/$/, '').replace(/\.html$/, '');
        if (path === href || path.endsWith(href)) {
          a.classList.add('active');
          // expand parent section
          var section = a.closest('.sidebar-section');
          if (section) section.classList.remove('collapsed');
        }
      });
    })();
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title | default: "CP-Library" }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/syntax.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    (function() {
      var t = localStorage.getItem('cp-lib-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="header-left">
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle sidebar">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <a href="{{ '/' | relative_url }}" class="logo">
        <div class="logo-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M13.325 3.05L8.667 20.432M15.333 3.568l4.667 7.894-4.667 7.894M4 19.356L8.667 11.462 4 3.568" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="logo-text">CP-Library</span>
        <span class="logo-badge">v1.0</span>
      </a>
    </div>
    <div class="header-right">
      <div class="search-box" id="searchBox">
        <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
          <path d="M16 16l4.5 4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Search docs..." autocomplete="off">
        <kbd class="search-kbd">/</kbd>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <a href="https://github.com/joji0/CP-Library" class="github-link" target="_blank" aria-label="GitHub">
        <svg height="22" width="22" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      </a>
    </div>
  </header>

  <!-- Sidebar Overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-inner">
      {% include sidebar.html %}
    </div>
  </aside>

  <!-- Main -->
  <main class="main-content">
    <article class="doc-content">
      {{ content }}
    </article>

    <footer class="site-footer">
      <div class="footer-inner">
        <span>Built by <a href="https://github.com/joji0">joji0</a></span>
        <span class="footer-dot"></span>
        <span>Powered by Jekyll</span>
      </div>
    </footer>
  </main>

  <!-- Search Results -->
  <div class="search-results" id="searchResults"></div>

  <!-- MathJax -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>

  <script>
    // ===== Theme Toggle =====
    (function() {
      var toggle = document.getElementById('themeToggle');
      toggle.addEventListener('click', function() {
        var cur = document.documentElement.getAttribute('data-theme');
        var next = cur === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('cp-lib-theme', next);
      });
    })();

    // ===== Mobile Sidebar =====
    (function() {
      var btn = document.getElementById('menuToggle');
      var sidebar = document.getElementById('sidebar');
      var overlay = document.getElementById('sidebarOverlay');
      function toggle() {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('active');
      }
      btn.addEventListener('click', toggle);
      overlay.addEventListener('click', toggle);
    })();

    // ===== Highlight Active Sidebar Link =====
    (function() {
      var path = window.location.pathname.replace(/\/$/, '').replace(/\.html$/, '');
      document.querySelectorAll('.sidebar-links a').forEach(function(a) {
        var href = a.getAttribute('href').replace(/\/$/, '').replace(/\.html$/, '');
        if (path === href || path.endsWith(href)) {
          a.classList.add('active');
          var section = a.closest('.sidebar-section');
          if (section) section.classList.remove('collapsed');
        }
      });
    })();

    // ===== Collapsible Sections =====
    document.querySelectorAll('.sidebar-section-title').forEach(function(t) {
      t.addEventListener('click', function() {
        this.parentElement.classList.toggle('collapsed');
      });
    });

    // ===== Search =====
    (function() {
      var input = document.getElementById('searchInput');
      var results = document.getElementById('searchResults');
      var allLinks = [];
      document.querySelectorAll('.sidebar-links a').forEach(function(a) {
        var section = a.closest('.sidebar-section');
        var cat = section ? section.querySelector('.sidebar-section-title span:last-child') : null;
        allLinks.push({
          text: a.textContent.trim(),
          href: a.getAttribute('href'),
          category: cat ? cat.textContent.trim() : ''
        });
      });

      document.addEventListener('keydown', function(e) {
        if (e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
          e.preventDefault();
          input.focus();
        }
        if (e.key === 'Escape') {
          input.blur();
          results.classList.remove('visible');
        }
      });

      input.addEventListener('input', function() {
        var q = this.value.toLowerCase().trim();
        if (!q) { results.classList.remove('visible'); return; }
        var matches = allLinks.filter(function(l) { return l.text.toLowerCase().includes(q); });
        if (!matches.length) {
          results.innerHTML = '<div class="search-empty">No results</div>';
        } else {
          results.innerHTML = matches.map(function(m) {
            return '<a class="search-result-item" href="' + m.href + '"><span class="sr-name">' + m.text + '</span><span class="sr-cat">' + m.category + '</span></a>';
          }).join('');
        }
        results.classList.add('visible');
      });

      input.addEventListener('blur', function() {
        setTimeout(function() { results.classList.remove('visible'); }, 200);
      });
      input.addEventListener('focus', function() {
        if (this.value.trim()) results.classList.add('visible');
      });
    })();

    // ===== Copy Code Buttons =====
    document.querySelectorAll('.doc-content pre').forEach(function(pre) {
      var btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'Copy';
      btn.addEventListener('click', function() {
        var code = pre.querySelector('code') || pre;
        navigator.clipboard.writeText(code.textContent).then(function() {
          btn.textContent = 'Copied!';
          btn.classList.add('copied');
          setTimeout(function() { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
        });
      });
      pre.style.position = 'relative';
      pre.appendChild(btn);
    });

    // ===== Heading Anchors =====
    document.querySelectorAll('.doc-content h2[id], .doc-content h3[id]').forEach(function(h) {
      var a = document.createElement('a');
      a.className = 'heading-anchor';
      a.href = '#' + h.id;
      a.textContent = '#';
      h.appendChild(a);
    });
  </script>

</body>
</html>

name: verify

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install oj-verify
      run: pip3 install -U online-judge-verify-helper

    - name: Run tests
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        YUKICODER_TOKEN: ${{ secrets.YUKICODER_TOKEN }}
      run: oj-verify run

    - name: Generate docs
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: oj-verify docs 2>&1 || true

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'

    - name: Install Jekyll
      run: gem install jekyll jekyll-theme-hacker kramdown-parser-gfm rouge

    - name: Build site
      run: |
        cd .verify-helper/markdown
        rm -f Gemfile Gemfile.lock
        cp -f ../docs/_config.yml ./_config.yml
        rm -rf _layouts assets
        cp -r ../docs/_layouts ./ 2>/dev/null || true
        cp -r ../docs/assets ./ 2>/dev/null || true
        JEKYLL_ENV=production jekyll build --destination _site
        touch _site/.nojekyll

    - name: Deploy to GitHub Pages
      if: success() && github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: .verify-helper/markdown/_site
        keep_files: false
        force_orphan: true
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'

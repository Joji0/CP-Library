name: verify

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip3 install -U online-judge-verify-helper

    - name: Run tests & generate docs
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        YUKICODER_TOKEN: ${{ secrets.YUKICODER_TOKEN }}
      run: oj-verify all

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'

    - name: Install Jekyll
      run: gem install jekyll kramdown-parser-gfm rouge jekyll-theme-hacker

    - name: Build site
      run: |
        DEST=.verify-helper/markdown

        # oj-verify already copied .verify-helper/docs/ into $DEST
        # (our _config.yml, _layouts/, assets/css/, and doc .md files)
        # Just need to remove its auto-generated Gemfile if present
        rm -f "$DEST/Gemfile" "$DEST/Gemfile.lock"

        # Build Jekyll
        cd "$DEST"
        JEKYLL_ENV=production jekyll build --destination _site

        # Prevent GitHub Pages from re-running Jekyll
        touch _site/.nojekyll

    - name: Deploy to GitHub Pages
      if: success() && github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: .verify-helper/markdown/_site
        keep_files: false
        force_orphan: true
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'

name: verify

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip3 install -U online-judge-verify-helper

    - name: Run tests (Generate Docs)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        YUKICODER_TOKEN: ${{ secrets.YUKICODER_TOKEN }}
      run: oj-verify all

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'

    - name: Install Jekyll
      run: gem install jekyll kramdown-parser-gfm rouge

    - name: Build site with custom theme
      run: |
        DEST=.verify-helper/markdown

        # Remove oj-verify's Gemfile and config so they don't interfere
        rm -f "$DEST/_config.yml" "$DEST/.nojekyll" "$DEST/Gemfile" "$DEST/Gemfile.lock"

        # Copy our custom theme files
        cp _config.yml "$DEST/_config.yml"
        cp index.md "$DEST/index.md"
        cp -r _layouts "$DEST/_layouts"
        cp -r _includes "$DEST/_includes"
        cp -r assets "$DEST/assets"

        # Copy our docs (overwrite verify-helper generated ones)
        mkdir -p "$DEST/docs"
        cp -r docs/* "$DEST/docs/" 2>/dev/null || true

        # Build Jekyll locally
        cd "$DEST"
        jekyll build --destination _site

        # Prevent GitHub Pages from running Jekyll again
        touch _site/.nojekyll

    - name: Deploy to GitHub Pages
      if: success() && github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: .verify-helper/markdown/_site
        keep_files: false
        force_orphan: true
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
